services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: istu_dwa_lb_2
    ports:
      - "5432:5432"
    volumes:
      - ./tmp/postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/init/02_register_initial_migration.sql:/docker-entrypoint-initdb.d/02_register_initial_migration.sql:ro
      - ./db/migrations/002_seed_admin.sql:/docker-entrypoint-initdb.d/03_seed_admin.sql:ro
      - ./db/init/04_register_002_migration.sql:/docker-entrypoint-initdb.d/04_register_002_migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d istu_dwa_lb_2"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/istu_dwa_lb_2
      PORT: "3000"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      JWT_SECRET: dev-docker-jwt-secret-change-me
    volumes:
      - .:/app
      - ./tmp/api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

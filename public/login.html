<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход — админка</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --panel: #1a2332;
        --text: #e8eef7;
        --muted: #9aa8bc;
        --accent: #5b9fd8;
        --error: #f07178;
        --border: #2a3648;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6fa;
          --panel: #fff;
          --text: #1a2332;
          --muted: #5c6b82;
          --accent: #1a6fb5;
          --error: #c62828;
          --border: #d8dee9;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .card {
        width: min(400px, 92vw);
        padding: 2rem;
        border-radius: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.35rem;
        font-weight: 650;
      }
      p.sub {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.35rem;
        color: var(--muted);
      }
      input {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: inherit;
        font-size: 1rem;
        margin-bottom: 1rem;
      }
      input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      button {
        width: 100%;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .err {
        margin: 0 0 1rem;
        padding: 0.65rem 0.75rem;
        border-radius: 8px;
        background: color-mix(in oklab, var(--error) 14%, transparent);
        color: var(--error);
        font-size: 0.9rem;
        display: none;
      }
      .err.show {
        display: block;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .foot {
        margin-top: 1.25rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Вход администратора</h1>
      <p class="sub">Токен сохраняется в cookie (httpOnly) для панели.</p>
      <div id="err" class="err" role="alert"></div>
      <form id="form" novalidate>
        <label for="login">Логин</label>
        <input id="login" name="login" autocomplete="username" required />
        <label for="password">Пароль</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />
        <button type="submit" id="btn">Войти</button>
      </form>
      <div class="foot"><a href="/admin.html">К панели</a></div>
    </main>
    <script>
      (function () {
        const form = document.getElementById('form');
        const err = document.getElementById('err');
        const btn = document.getElementById('btn');

        function showError(msg) {
          err.textContent = msg;
          err.classList.add('show');
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          err.classList.remove('show');
          const login = document.getElementById('login').value.trim();
          const password = document.getElementById('password').value;
          if (!login || !password) {
            showError('Введите логин и пароль.');
            return;
          }
          btn.disabled = true;
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({ login, password }),
            });
            const data = await res.json().catch(function () {
              return {};
            });
            if (!res.ok) {
              showError(data.error || 'Ошибка входа.');
              return;
            }
            window.location.href = '/admin.html';
          } catch {
            showError('Сеть недоступна или сервер не отвечает.');
          } finally {
            btn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
